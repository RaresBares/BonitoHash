stages:
  - test
  - deploy

.runner:
  image: ${CI_REGISTRY}/traque/ont-docker-base/ont-base-python:${PYTHON_VERSION}
  tags:
    - docker
    - linux_x86

build_bonito:
  stage: test
  extends: .runner
  parallel:
    matrix:
      - CUDA_VERSION: ["128", "130"]
        PYTHON_VERSION: ["3.10", "3.11", "3.12", "3.13", "3.14"]
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - when: on_success
  script:
    - python3 -m venv venv
    - source venv/bin/activate
    - pip install -e .[cu${CUDA_VERSION}] ${PYTORCH_MIRROR}
    - bonito --version  # minimal sanity check
    - python -m unittest discover
    # Check we can build a wheel
    - pip install build twine
    - python -m build
    - test -n "$(find dist -type f -name '*.whl' -print)"


deploy:external_PyPI:
  stage: deploy
  extends: .runner
  variables:
    PYTHON_VERSION: "3.13"
  rules: # Trigger manually when a gitlab-tag is created
    - if: $CI_COMMIT_TAG
      when: manual
    - when: never
  script:
    - pip install build twine
    - python -m build
    - ls -lh dist/*.whl
    - twine upload --repository-url ${PYPI_EXTERNAL} dist/*.whl
